# ============================================================================
# Sadegroo Portfolio — build & deploy to GitHub Pages
# ============================================================================
# Build the Hugo site with PaperMod (git submodule) and publish the rendered
# `public/` directory to the `gh-pages` branch using peaceiris/actions-gh-pages.
#
# Auth: default GITHUB_TOKEN (no PAT, no custom secrets).
#
# To upgrade Hugo: bump HUGO_VERSION below. The version pinned here matches
# the developer's local install (see .planning/phases/01-foundation/01-01-SUMMARY.md).
# ----------------------------------------------------------------------------

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys when commits land in quick succession.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write   # peaceiris/actions-gh-pages pushes commits to the gh-pages branch

env:
  HUGO_VERSION: "0.160.1"
  HUGO_ENV: production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with PaperMod submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build site
        # No --buildDrafts: draft posts (e.g. content/posts/bldc-pendulum.md)
        # stay unpublished until the author flips `draft = false`.
        run: hugo --gc --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # commit metadata for the auto-deploy commit on gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
