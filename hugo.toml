# ============================================================================
# Sadegroo Portfolio — Hugo site configuration
# ============================================================================
# Theme: PaperMod (git submodule at themes/PaperMod)
# Docs:  https://github.com/adityatelange/hugo-PaperMod/wiki
# ----------------------------------------------------------------------------

# Live at the GitHub Pages project URL (sadegroo/portfolio is a project repo,
# not a user-site repo, so the path includes /portfolio/).
# To switch to a custom domain later, see .planning/seeds/custom-domain-pages-sadegroo-xyz.md
baseURL = "https://sadegroo.github.io/portfolio/"

title        = "Sadegroo"
languageCode = "en"
theme        = "PaperMod"

# Rewrite root-relative URLs (e.g. /img/foo.png) to absolute URLs prepended
# with baseURL during build. Required because the site lives under a subpath
# (/portfolio/) on GitHub Pages — without this, raw <video> tags and figure
# shortcodes emit /img/... which the browser resolves against the wrong root.
# Auto-adapts if baseURL ever changes (e.g. switch to pages.sadegroo.xyz).
canonifyURLs = true

# Enable PaperMod's client-side search by emitting a JSON index for the home page.
# PaperMod's search template (layouts/_default/search.html in the theme) reads /index.json.
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Tag taxonomy is on by default in Hugo, but declare it explicitly so it's
# discoverable and so future taxonomies (categories, series) slot in cleanly.
[taxonomies]
  tag = "tags"

# Allow inline HTML (e.g. <video>, <iframe>) in markdown. "Unsafe" only matters
# when accepting third-party markdown submissions, which this site doesn't.
[markup.goldmark.renderer]
  unsafe = true

# ----------------------------------------------------------------------------
# Main navigation menu
# ----------------------------------------------------------------------------
# Lower `weight` = further left. Posts is implicit via PaperMod's defaults,
# but we surface About explicitly per the v1 brief (SCAF-04).
# The /search/ entry is wired up by PaperMod when JSON output is enabled.
[[menu.main]]
  identifier = "about"
  name       = "About"
  url        = "/about/"
  weight     = 10

[[menu.main]]
  identifier = "posts"
  name       = "Posts"
  url        = "/posts/"
  weight     = 20

[[menu.main]]
  identifier = "search"
  name       = "Search"
  url        = "/search/"
  weight     = 30

# ----------------------------------------------------------------------------
# PaperMod theme parameters
# ----------------------------------------------------------------------------
[params]
  # Enable PaperMod's built-in Fuse.js search (requires the JSON output above).
  ShowShareButtons    = false
  ShowReadingTime     = true
  ShowPostNavLinks    = true
  ShowBreadCrumbs     = true
  ShowCodeCopyButtons = true

  [params.fuseOpts]
    isCaseSensitive    = false
    shouldSort         = true
    location           = 0
    distance           = 1000
    threshold          = 0.4
    minMatchCharLength = 0
    keys               = ["title", "permalink", "summary", "content"]
